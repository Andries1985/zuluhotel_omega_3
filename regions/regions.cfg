#
# Region Data
#
# This file can be split up into multiple files, if different region
# definitions are desired.
# For example, if justice.cfg exists, it will be used for Guarded, etc
#
# Like any other region file, regions only override regions found earlier in the file.  
#
# Justice Regions (justice.cfg)
#    Guarded    0/1     Is the justice region guarded?
#    EnterText  [text]  Text to display upon entry
#    LeaveText  [text]  Text to display upon exit
# 
# Music Regions (music.cfg)
#    MIDI       [MIDInumber]    Music to play while in this region
#                               Can occur more than once
#                               we'll probably do some sort of MIDIlist thing
#
# NoCast Regions (nocast.cfg)
#    nocast     0/1             1 if spells can't be cast here.
#
# Region RegionName
# {
#	Range		x-west y-north x-east y-south
#	Realm		realm name
#	Guarded		0/1
#	EnterText	text
#	LeaveText	text
#	EnterScript	script path
#	LeaveScript	script path
#	MIDI		Music number
#	NoCast		0/1
#	NoCombat	0/1
#	LightLevel		light level number
#	LightOverride	light level override number
#	WeatherType	type number
#	WeatherSeverity	severity number
#	WeatherAux	aux number
# }
#
# Weather
#	0 - light rain ("It starts to rain")
#	1 - rain/thunder ("A fierce storm approaches")
#	2 - snow ("It begins to snow")
#	3 - brewing storm - ("A storm is brewing")
#	255 - None (Turns sound effects off)
#	Severity:is set on a 0-70 scale, 70=torrential rain, 0=light drizzle.
#	Aux: nothing
#
# Light
#	LightLevel       (int light level {default 0}]  0 = daylight, 30 = black.
#	LightOverride: light level amount overrides current level. -1 means no override.
# Default Light Level is set in servspecopt.cfg

