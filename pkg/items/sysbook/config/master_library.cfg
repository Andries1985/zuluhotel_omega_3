	p13l2	others in need, which one 
	p13l3	day, may be needed in 
	p13l4	return.
	p13l5	
	p13l6	Courage and Truth give 
	p13l7	us Honor, great knights 
	p13l8	know this well, that 
	p14l1	chivalric honor can be 
	p14l2	found by adhering to this 
	p14l3	code of conduct.
	p14l4	
	p14l5	Combining Truth, Love and 
	p14l6	Courage suggest the 
	p14l7	virtue of Spirituality the 
	p14l8	virtu(e) that causes one 
	p15l1	to be introspective, to 
	p15l2	wonder about ones place 
	p15l3	in this world and whether 
	p15l4	one’s deeds will be 
	p15l5	recorded as a gift to 
	p15l6	the world or a plague.
	p15l7	
	p15l8	
	p16l1	The final Virtue is more 
	p16l2	complicated. For the 
	p16l3	eighth combination is that 
	p16l4	devoid of Truth, Love or 
	p16l5	Courage which can only 
	p16l6	exist in a state of great 
	p16l7	Pride, whic(h) of course 
	p16l8	is not a virtue at all. 
	p17l1	Perhaps this trick of 
	p17l2	fate is a test to see if 
	p17l3	one can realize that the 
	p17l4	true virtue is that of 
	p17l5	Humility. I feel that the 
	p17l6	people of Magincia fail to 
	p17l7	see this to such a 
	p17l8	degree that I would not 
	p18l1	be surprised if some ill 
	p18l2	fate awaited their future.
	p18l3	
	p18l4	Thus from the infinite 
	p18l5	possibilities which spawned 
	p18l6	the Three Principles of 
	p18l7	Truth, Love and Courage, 
	p18l8	come the Eight Virtues 
	p19l1	of Honesty, Compassion, 
	p19l2	Valor, Justice, Sacrifice, 
	p19l3	Honor, Spirituality, and 
	p19l4	Humility.
}

