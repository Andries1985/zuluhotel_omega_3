	p9l8	the listener as to any 
	p10l1	real locale!
	p10l2	
	p10l3	Another possibility is that 
	p10l4	this is some form of 
	p10l5	creation myth explaining 
	p10l6	the genesis of the 
	p10l7	various humanoid 
	p10l8	creatures that roam the 
	p11l1	lands of Britannia. It 
	p11l2	does not take a stretch 
	p11l3	of the imagination to 
	p11l4	name the middle verse’s 
	p11l5	“girl becomes tree” as 
	p11l6	a possible explanation for 
	p11l7	the reaper, for in the 
	p11l8	area surrounding Minoc, 
	p12l1	reapers are oft referred 
